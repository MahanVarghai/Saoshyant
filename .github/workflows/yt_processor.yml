name: YouTube Metadata Extractor with PO Token

on:
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Manual trigger'
        required: false

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp and plugin
        run: |
          # نصب yt-dlp的最新 نسخه
          pip install yt-dlp
          # نصب پلاگین PO Token Provider مستقیماً از PyPI
          pip install bgutil-ytdlp-pot-provider

      - name: Run extraction script
        run: python yt_info.py
