name: YouTube Scraper with Nodriver
on:
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Run the scraper'
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nodriver playwright
          playwright install chromium

      - name: Run Nodriver script
        run: python youtube_nodriver_scraper.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add yt_results.json urls.txt
          git diff --staged --quiet || git commit -m "Update scraped data"
          git push
