name: YouTube Scraper with Nodriver (Headless)

on:
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Run the scraper'
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev libxkbcommon-x11-0 libxdamage1 libxrandr2 \
            libxcomposite1 libxfixes3 libxshmfence1 \
            libasound2t64 \
            fonts-liberation xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nodriver

      - name: Run scraper with virtual display
        run: xvfb-run -a python youtube_nodriver_scraper.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add yt_results.json
          git diff --staged --quiet || git commit -m "Update YouTube metadata"
          git push
