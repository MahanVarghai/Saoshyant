name: Commander

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run (hello / shutdown)'
        required: true
        type: choice
        options:
          - hello
          - shutdown

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Execute command
        run: |
          if [ "${{ github.event.inputs.command }}" = "hello" ]; then
            echo "Hello World" > hello.txt
            echo "✅ Created hello.txt"
          elif [ "${{ github.event.inputs.command }}" = "shutdown" ]; then
            echo "🛑 Shutdown command received. Workflow will stop."
          else
            echo "❌ Unknown command"
            exit 1
          fi
      
      - name: Upload artifact (for hello)
        if: github.event.inputs.command == 'hello'
        uses: actions/upload-artifact@v4
        with:
          name: hello-message
          path: hello.txt
