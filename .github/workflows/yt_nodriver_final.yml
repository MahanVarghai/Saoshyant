name: YouTube Scraper with Nodriver (Final)

on:
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Run the scraper'
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm-dev libasound2t64

      - name: Install browser
        run: sudo apt-get install -y chromium-browser

      - name: Install python packages
        run: |
          pip install -U pip
          pip install nodriver

      - name: Run scraper
        run: xvfb-run -a python youtube_nodriver_final.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add yt_results.json
          git diff --staged --quiet || git commit -m "Add YouTube metadata"
          git push
