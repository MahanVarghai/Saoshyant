name: Echo

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Your message to workflow'
        required: true
        type: string

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write response to file
        run: |
          echo "Workflow received: '${{ github.event.inputs.message }}'" > response.txt
          echo "And says: Hello from GitHub Actions!" >> response.txt
          echo "Time: $(date -u)" >> response.txt

      - name: Commit and push response
        id: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add response.txt
          git commit -m "Update response" || echo "No changes to commit"
          git push
          # ذخیره commit hash بعد از push
          echo "COMMIT_HASH=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Save commit hash to file
        run: |
          echo "${{ steps.commit.outputs.COMMIT_HASH }}" > last_commit.txt
          git add last_commit.txt
          git commit -m "Update last commit hash" || true
          git push
