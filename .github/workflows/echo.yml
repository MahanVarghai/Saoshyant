name: Echo

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Your message to workflow'
        required: true
        type: string

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write response to file
        run: |
          echo "Workflow received: '${{ github.event.inputs.message }}'" > response.txt
          echo "And says: Hello from GitHub Actions!" >> response.txt
          echo "Time: $(date -u)" >> response.txt

      - name: Commit and push response
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add response.txt
          git commit -m "Update response" || echo "No changes to commit"
          git push
