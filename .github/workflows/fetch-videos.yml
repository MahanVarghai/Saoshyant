name: Fetch YouTube Videos Info

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install yt-dlp requests

      - name: 🧹 پاک‌سازی فایل‌های قدیمی
        run: |
          set -x
          rm -f youtube_data_*.zip
          rm -rf thumbnails 2>/dev/null || true

      - name: 🚀 اجرای اسکریپت دریافت اطلاعات
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          set -x
          python fetch_video_info.py

      - name: 📋 نمایش محتویات پوشه
        run: |
          set -x
          ls -lah

      - name: 💾 کامیت و پوش فایل‌های جدید
        run: |
          set -x
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos_info.json zip_name.txt *.zip
          if git diff --staged --quiet; then
            echo "✅ هیچ تغییری برای کامیت وجود ندارد."
          else
            git commit -m "به‌روزرسانی داده‌های ویدئوها و فایل ZIP [skip ci]"
            git pull --rebase --autostash -X theirs origin main
            git push
          fi
