name: Fetch YouTube Videos Info

on:
  workflow_dispatch:            # اجرای دستی از تب Actions
  schedule:
    - cron: '0 0 * * *'        # هر روز ساعت ۳:۳۰ به وقت ایران (UTC 0:0)
  push:
    branches: [main]            # فقط در صورت تغییر urls.txt اجرا شود
    paths:
      - 'urls.txt'

jobs:
  fetch:
    runs-on: ubuntu-latest

    # دسترسی نوشتن در مخزن برای کامیت فایل JSON
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Run fetch script
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}   # تزریق Secret به محیط
        run: python fetch_video_info.py

      - name: Commit updated videos_info.json
        # اگر تغییری در فایل نباشد، کامیتی انجام نمی‌شود
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos_info.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update videos_info.json [skip ci]"
            git push
          fi
