name: Process URLs

on:
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Trigger'
        required: false

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process URLs
        run: python process_urls.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add response.txt
          git commit -m "Update response.txt" || echo "No changes"
          git push
