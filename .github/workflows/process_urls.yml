name: Process URLs

on:
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Trigger (ignored)'
        required: false
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Process URLs
        run: |
          import sys, urllib.request, urllib.error
          results = []
          try:
              with open('urls.txt', 'r') as f:
                  urls = [line.strip() for line in f if line.strip()]
          except FileNotFoundError:
              print("urls.txt not found")
              sys.exit(1)
          
          for i, url in enumerate(urls, 1):
              try:
                  response = urllib.request.urlopen(url, timeout=10)
                  status = response.getcode()
                  results.append(f"{i}. {url} -> OK (status {status})")
              except Exception as e:
                  results.append(f"{i}. {url} -> FAILED ({str(e)})")
          
          with open('response.txt', 'w') as f:
              f.write("Processing Results:\n")
              f.write("==================\n")
              f.write('\n'.join(results))
              f.write(f"\n\nTotal URLs: {len(urls)}")
              
      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add response.txt
          git commit -m "Update response.txt" || echo "No changes"
          git push
