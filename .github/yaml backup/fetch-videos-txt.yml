name: Fetch YouTube Videos Info In Text

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [main]
    paths:
      - 'urls.txt'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Run fetch script
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: python fetch_video_info.py

      - name: Commit and push updated videos_info.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add videos_info.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          # ابتدا کامیت محلی
          git commit -m "Update videos_info.json [skip ci]"

          # دریافت تغییرات ریموت و rebase کردن کامیت خودمان روی آن
          # اگر تداخلی پیش آمد، نسخهٔ ما نگه داشته شود
          git pull --rebase -X theirs origin main

          git push
